<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список завдань</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="task-list-container">
        <div class="task-list-header">
                 <h1 class="task-list-title">📝 Список завдань</h1>
        </div>
        <div class="task-input">
     <input type="text" id="task-input" placeholder="Введіть нове завдання" maxlength="100">
     <button type="submit" id="add-btn" title="Додати нове завдання">Додати</button>
</div>

        <div class="task-list"  id="task-list">
            <label class="task-list-item">
                <input type="checkbox" checked>
                <span class="task-checkmark"></span>
                <span class="task-text" contenteditable="true" spellcheck="false">Опанувати HTML та CSS</span>
                <button class="task-done-btn" title="Змінити відмітку виконання завдання">✔</button>     
                <button class="delete-btn" title="Видалити завдання">✖</button>
            </label>
 
            <label class="task-list-item">
                <input type="checkbox">
                <span class="task-checkmark"></span>
                <span class="task-text" contenteditable="true" spellcheck="false">Опанувати Git та GitHub</span>
                <button class="task-done-btn" title="Змінити відмітку виконання завдання">✔</button>     
                <button class="delete-btn" title="Видалити завдання">✖</button>
            </label>
 
            <label class="task-list-item">
                <input type="checkbox">
                <span class="task-checkmark"></span>
                <span class="task-text" contenteditable="true" spellcheck="false">Опанувати JavaScript</span>
                <button class="task-done-btn" title="Змінити відмітку виконання завдання">✔</button>     
                <button class="delete-btn" title="Видалити завдання">✖</button>
            </label>
 
            <label class="task-list-item">
                <input type="checkbox">
                <span class="task-checkmark"></span>
                <span class="task-text" contenteditable="true" spellcheck="false">Опанувати Node.js</span>
                <button class="task-done-btn" title="Змінити відмітку виконання завдання">✔</button>     
                <button class="delete-btn" title="Видалити завдання">✖</button>
            </label>
        </div>
    </div>
        <script src="script.js"></script>

 </body>
</html>
